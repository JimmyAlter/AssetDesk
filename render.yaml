services:
  - type: web
    name: assetdesk-backend
    env: node
    plan: free
    buildCommand: npm install --prefix backend
    startCommand: node backend/src/server.js
    disk:
      name: assetdesk-db
      mountPath: /opt/data
      sizeGB: 1
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DB_PATH
        value: /opt/data/assetdesk.db
      - key: CORS_ORIGIN
        value: https://assetdesk-demo.vercel.app
